services:
  order-service:
    build:
      context: .
      dockerfile: src/Dockerfile
    ports:
      - "8000:80"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB__USER}:${DB__PASSWORD}@${DB__HOST}:5432/${DB__NAME}
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: order_service_postgres_db
    environment:
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
      POSTGRES_DB: ${DB__NAME}
    ports:
      - "${DB__PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: